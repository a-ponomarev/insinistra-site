# EPK (Electronic Press Kit) config for /epk
# Used for booking, festivals, and press.

one_liner: "Symphonic metal from Prague — lilac haze between lullaby and nightmare."

short_bio: |
  Insinistra crafts a symphonic metal experience that is both macabre and sweet:
  heavy riffs meet lush orchestration, with a voice that moves from tender to fierce.
  Based in Prague, the band is led by vocalist Maria Shell and drummer Alexander Ponomarev,
  with guitarist Serge Melnikov and bassist Boris Gut completing the line-up.

booking_email: "booking@insinistra.com"
press_email: "press@insinistra.com"
